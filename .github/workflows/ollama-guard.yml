# ollama-guard.yml
# Developer: Marcus Daley
# Date: 2026-05-03
# Purpose: CI error-checker — triggers when typecheck or lint fails, uses Ollama
#          to generate a fix, auto-commits small fixes or opens a PR for larger ones

name: Ollama Guard

on:
  workflow_run:
    workflows: ["CI"]          # adjust to match your actual CI workflow name
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  ollama-guard:
    # Only run when CI failed — don't burn minutes on green builds
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          # Use a PAT if you need to push to protected branches
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          # Start Ollama server in background
          ollama serve &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            ollama list &>/dev/null && break || sleep 2
          done

      - name: Pull model
        run: |
          # Read model from config, fallback to codellama:7b
          MODEL="codellama:7b"
          if [[ -f ".ollama-guard.yml" ]]; then
            _val=$(grep -E "^model:" .ollama-guard.yml 2>/dev/null | head -1 | sed 's/^[^:]*: *//;s/"//g' || true)
            [[ -n "$_val" ]] && MODEL="$_val"
          fi
          echo "OLLAMA_MODEL=$MODEL" >> $GITHUB_ENV
          echo "Pulling model: $MODEL"
          ollama pull "$MODEL" || {
            FALLBACK="deepseek-coder:6.7b"
            echo "Primary model failed, pulling fallback: $FALLBACK"
            ollama pull "$FALLBACK"
            echo "OLLAMA_MODEL=$FALLBACK" >> $GITHUB_ENV
          }

      - name: Run ollama-guard error check
        id: check
        run: |
          chmod +x scripts/ollama-guard/ollama-check.sh
          EXIT_CODE=0
          scripts/ollama-guard/ollama-check.sh --ci || EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [[ -f ".ollama-guard-linecount.txt" ]]; then
            LINES=$(cat .ollama-guard-linecount.txt)
            echo "changed_lines=$LINES" >> $GITHUB_OUTPUT
          else
            echo "changed_lines=0" >> $GITHUB_OUTPUT
          fi

      - name: Read config thresholds
        id: config
        run: |
          THRESHOLD=5
          BRANCH="main"
          COMMIT_PATTERN='fix(ollama): %s [skip ci]'
          PR_LABEL="ollama-guard"
          if [[ -f ".ollama-guard.yml" ]]; then
            _t=$(grep -E "^line_diff_threshold:" .ollama-guard.yml 2>/dev/null | head -1 | sed 's/^[^:]*: *//' || true)
            [[ -n "$_t" ]] && THRESHOLD="$_t"
            _b=$(grep -E "^branch:" .ollama-guard.yml 2>/dev/null | head -1 | sed 's/^[^:]*: *//;s/"//g' || true)
            [[ -n "$_b" ]] && BRANCH="$_b"
            _l=$(grep -E "^pr_label:" .ollama-guard.yml 2>/dev/null | head -1 | sed 's/^[^:]*: *//;s/"//g' || true)
            [[ -n "$_l" ]] && PR_LABEL="$_l"
          fi
          echo "threshold=$THRESHOLD" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH"       >> $GITHUB_OUTPUT
          echo "pr_label=$PR_LABEL"   >> $GITHUB_OUTPUT

      # ── Path A: small fix → auto-commit to main ──────────────────────────────
      - name: Apply small fix (auto-commit)
        if: |
          steps.check.outputs.exit_code == '1' &&
          steps.check.outputs.changed_lines != '0' &&
          fromJson(steps.check.outputs.changed_lines) <= fromJson(steps.config.outputs.threshold)
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          PATCH=".ollama-guard-patch.diff"
          if [[ ! -f "$PATCH" ]]; then
            echo "Patch file missing — skipping"
            exit 0
          fi

          if git apply --check "$PATCH" 2>/dev/null; then
            git apply "$PATCH"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            FIX_DESC=$(head -5 "$PATCH" | grep "^@@" | head -1 | sed 's/^.*@@ //' | cut -c1-60 || echo "auto-fix CI errors")
            COMMIT_MSG="fix(ollama): $FIX_DESC [skip ci]"

            git add -u
            git diff --cached --quiet || git commit -m "$COMMIT_MSG"
            git push origin ${{ steps.config.outputs.branch }}
            echo "✅ Auto-committed: $COMMIT_MSG"
          else
            echo "⚠️  Patch failed to apply cleanly — falling through to PR path"
            echo "exit_code=2" >> $GITHUB_OUTPUT
          fi

      # ── Path B: large fix → open PR ───────────────────────────────────────────
      - name: Open PR for large fix
        if: |
          steps.check.outputs.exit_code == '1' &&
          steps.check.outputs.changed_lines != '0' &&
          fromJson(steps.check.outputs.changed_lines) > fromJson(steps.config.outputs.threshold)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PATCH=".ollama-guard-patch.diff"
          if [[ ! -f "$PATCH" ]]; then
            echo "Patch file missing — skipping"
            exit 0
          fi

          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          BRANCH_NAME="ollama-guard/fix-${SHORT_SHA}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"

          if git apply --check "$PATCH" 2>/dev/null; then
            git apply "$PATCH"
            git add -u
            git commit -m "fix(ollama): CI error fix for ${SHORT_SHA}"
            git push origin "$BRANCH_NAME"

            gh pr create \
              --base "${{ steps.config.outputs.branch }}" \
              --head "$BRANCH_NAME" \
              --title "fix(ollama): CI error fix for ${SHORT_SHA}" \
              --label "${{ steps.config.outputs.pr_label }}" \
              --body "$(cat <<'EOF'
## Ollama Guard — Automated Fix

This PR was opened automatically by ollama-guard after a CI failure.

**Trigger commit:** \`${{ github.sha }}\`
**Changed lines:** ${{ steps.check.outputs.changed_lines }} (above auto-commit threshold of ${{ steps.config.outputs.threshold }})

### What to check before merging
- [ ] The fix addresses the actual CI failure (typecheck / lint / test)
- [ ] No unintended logic changes
- [ ] Tests still pass after the patch

> Generated by [ollama-guard](https://github.com/GrizzwaldHouse/VetAssist/tree/main/scripts/ollama-guard)
EOF
)"
            echo "✅ PR opened: $BRANCH_NAME"
          else
            echo "⚠️  Patch could not be applied cleanly — manual fix required"
          fi

      # ── Path C: unfixable errors → summary only ───────────────────────────────
      - name: Report unfixable errors
        if: steps.check.outputs.exit_code == '2'
        run: |
          echo "⚠️  ollama-guard could not generate a fix for these CI errors."
          echo "    Review the CI logs above and fix manually."
          if [[ -f ".ollama-guard-summary.txt" ]]; then
            echo ""
            echo "── Ollama summary ────────────────────────────────────"
            cat ".ollama-guard-summary.txt"
            echo "──────────────────────────────────────────────────────"
          fi
          # Don't fail the workflow — CI already failed; this is informational
          exit 0
